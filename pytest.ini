[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Coverage is specified per invocation:
#   Full suite:   pytest tests/ --cov=src --cov-fail-under=80
#   Single layer: pytest tests/data/ --cov=src/data --cov-fail-under=80
#                 pytest tests/graph/ --cov=src/graph --cov-fail-under=80
addopts = --cov-report=term-missing
